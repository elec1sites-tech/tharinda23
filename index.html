<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่าย ร้านน้ำปั่น</title>
    <!-- นำเข้าฟอนต์ภาษาไทย Prompt จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* === ส่วนที่ 1: การตกแต่ง CSS === */
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            background-color: #f0f7f4; /* สีพื้นหลังโทนสบายตา */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); /* เพิ่มเงาให้ดูมีมิติ */
        }
        h2 {
            text-align: center;
            color: #ff6b6b; /* สีหัวข้อหลัก (ส้มอมชมพู) */
            margin-top: 0;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4ecdc4; /* สีขอบเมื่อกำลังพิมพ์ (เขียวมิ้นต์) */
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #4ecdc4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: #3db8af;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        /* ข้อความแจ้งเตือน */
        #status-message {
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
            font-size: 14px;
            display: none;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🍹 บันทึกรายรับ-รายจ่าย</h2>
        
        <!-- === ส่วนที่ 2: โครงสร้าง HTML (ฟอร์ม) === -->
        <form id="expenseForm">
            <div class="form-group">
                <label for="date">วันที่:</label>
                <!-- กำหนดให้เป็นชนิด date เพื่อแสดงปฏิทิน -->
                <input type="date" id="date" name="Date" required>
            </div>

            <div class="form-group">
                <label for="type">ประเภทรายการ:</label>
                <select id="type" name="Transaction_Type" required>
                    <option value="รายรับ">🟢 รายรับ (ยอดขาย)</option>
                    <option value="รายจ่าย">🔴 รายจ่าย (ต้นทุน)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category">หมวดหมู่:</label>
                <select id="category" name="Category" required>
                    <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                    <option value="ขายเครื่องดื่ม">ขายเครื่องดื่ม</option>
                    <option value="วัตถุดิบ (ผลไม้/น้ำเชื่อม)">วัตถุดิบ (ผลไม้/น้ำเชื่อม)</option>
                    <option value="บรรจุภัณฑ์ (แก้ว/หลอด)">บรรจุภัณฑ์ (แก้ว/หลอด)</option>
                    <option value="ค่าใช้จ่ายร้าน (ค่าน้ำ/ไฟ/ที่)">ค่าใช้จ่ายร้าน (ค่าน้ำ/ไฟ/ที่)</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">รายละเอียด (เช่น แตงโมปั่น 2 แก้ว):</label>
                <input type="text" id="description" name="Description" required>
            </div>

            <div class="form-group">
                <label for="amount">จำนวนเงิน (บาท):</label>
                <!-- บังคับกรอกเฉพาะตัวเลข และรับค่าทศนิยมได้ -->
                <input type="number" id="amount" name="Amount" step="0.25" min="0" required>
            </div>

            <div class="form-group">
                <label for="payment">ช่องทางชำระเงิน:</label>
                <select id="payment" name="Payment_Method" required>
                    <option value="เงินสด">💵 เงินสด</option>
                    <option value="โอนเงิน">📱 โอนเงิน (สแกนจ่าย)</option>
                    <option value="แอปเดลิเวอรี่">🛵 แอปเดลิเวอรี่</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notes">หมายเหตุ (ถ้ามี):</label>
                <textarea id="notes" name="Notes" rows="2"></textarea>
            </div>

            <button type="submit" id="submit-btn">💾 บันทึกข้อมูล</button>
        </form>

        <div id="status-message"></div>
    </div>

    <!-- === ส่วนที่ 3: สคริปต์การทำงาน (JavaScript) === -->
    <script>
        // กำหนด URL ของ Google Apps Script ที่ Deploy เป็น Web App
        const SCRIPT_URL = "วาง_ของ_GOOGLE_APPS_SCRIPT_ที่นี่";
        
        const form = document.getElementById('expenseForm');
        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');

        // ตั้งค่าเริ่มต้นให้ช่อง "วันที่" เป็นวันที่ปัจจุบันเสมอ
        document.getElementById('date').valueAsDate = new Date();

        // เมื่อมีการกด Submit ฟอร์ม
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรชตัวเอง

            // เปลี่ยนสถานะปุ่มเพื่อป้องกันการกดซ้ำ
            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ กำลังบันทึกข้อมูล...';
            statusMessage.style.display = 'none';
            statusMessage.className = '';

            // รวบรวมข้อมูลจากฟอร์ม
            const formData = new FormData(form);

            // ส่งข้อมูลไปยัง Google Apps Script
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: formData 
            })
            .then(response => {
                // หากการส่งข้อมูลสำเร็จ
                statusMessage.innerHTML = '✅ บันทึกข้อมูลสำเร็จเรียบร้อย';
                statusMessage.classList.add('success');
                statusMessage.style.display = 'block';
                
                // ล้างข้อมูลในฟอร์มเพื่อเตรียมกรอกรายการถัดไป
                form.reset();
                document.getElementById('date').valueAsDate = new Date(); // คืนค่าวันที่เป็นวันนี้
            })
            .catch(error => {
                // หากเกิดข้อผิดพลาดในการส่งข้อมูล
                console.error('Error:', error);
                statusMessage.innerHTML = '❌ เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่';
                statusMessage.classList.add('error');
                statusMessage.style.display = 'block';
            })
            .finally(() => {
                // ไม่ว่าจะสำเร็จหรือพัง ให้คืนสถานะปุ่มกลับมาให้กดได้อีกครั้ง
                submitBtn.disabled = false;
                submitBtn.innerHTML = '💾 บันทึกข้อมูล';
                
                // ซ่อนข้อความแจ้งเตือนหลังจากผ่านไป 3 วินาที
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 3000);
            });
        });
    </script>
</body>
</html>
