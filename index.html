<!-- --- ไฟล์ index.html --- -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่าย ร้านน้ำปั่น</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS สำหรับความสวยงาม */
        :root {
            --primary: #ff7e67;
            --secondary: #00c9a7;
            --bg: #f4f7f6;
            --text: #333;
        }
        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .main-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        
        /* ระบบ Tabs */
        .tab-menu { display: flex; background-color: #f8f9fa; border-bottom: 2px solid var(--primary); }
        .tab-button {
            flex: 1; padding: 15px; text-align: center; font-family: inherit; font-size: 16px;
            font-weight: 500; cursor: pointer; border: none; background: none; color: #6c757d; transition: 0.3s;
        }
        .tab-button.active { background-color: var(--primary); color: white; font-weight: 600; }
        .tab-content { display: none; padding: 25px; }
        .tab-content.active { display: block; }

        /* ฟอร์ม */
        h2 { text-align: center; color: var(--primary); margin: 0 0 20px 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        input, select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px;
            font-family: inherit; font-size: 15px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--secondary); }
        button.submit-btn {
            width: 100%; padding: 12px; background-color: var(--secondary); color: white; border: none;
            border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        button.submit-btn:hover { background-color: #00b395; }
        button.submit-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* แจ้งเตือน และ Iframe */
        #message { text-align: center; margin-top: 15px; font-weight: 500; display: none; padding: 10px; border-radius: 6px; }
        .sheet-frame { width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- เมนูสลับหน้า -->
        <div class="tab-menu">
            <button class="tab-button active" onclick="switchTab('formTab', this)">📝 บันทึกข้อมูล</button>
            <button class="tab-button" onclick="switchTab('sheetTab', this)">📊 ตรวจสอบรายรับรายจ่าย</button>
        </div>

        <!-- หน้าที่ 1: ฟอร์มบันทึกข้อมูล -->
        <div id="formTab" class="tab-content active">
            <h2>บันทึกรายการประจำวัน</h2>
            <form id="recordForm">
                <div class="form-group">
                    <label>วันที่:</label>
                    <input type="date" name="Date" id="dateInput" required>
                </div>
                <div class="form-group">
                    <label>ประเภทรายการ:</label>
                    <select name="Transaction_Type" required>
                        <option value="รายรับ">🟢 รายรับ</option>
                        <option value="รายจ่าย">🔴 รายจ่าย</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>หมวดหมู่:</label>
                    <select name="Category" required>
                        <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                        <option value="ขายเครื่องดื่ม">ขายเครื่องดื่ม</option>
                        <option value="วัตถุดิบ (ผลไม้/น้ำเชื่อม)">วัตถุดิบ (ผลไม้/น้ำเชื่อม)</option>
                        <option value="บรรจุภัณฑ์ (แก้ว/หลอด)">บรรจุภัณฑ์ (แก้ว/หลอด)</option>
                        <option value="ค่าใช้จ่ายร้าน">ค่าใช้จ่ายร้าน</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>รายละเอียด:</label>
                    <input type="text" name="Description" required placeholder="เช่น แตงโมปั่น 2 แก้ว">
                </div>
                <div class="form-group">
                    <label>จำนวนเงิน (บาท):</label>
                    <input type="number" name="Amount" step="0.5" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>ช่องทางชำระเงิน:</label>
                    <select name="Payment_Method" required>
                        <option value="เงินสด">💵 เงินสด</option>
                        <option value="โอนเงิน">📱 โอนเงิน (สแกนจ่าย)</option>
                        <option value="แอปเดลิเวอรี่">🛵 แอปเดลิเวอรี่</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>หมายเหตุ:</label>
                    <textarea name="Notes" rows="2"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">บันทึกข้อมูล</button>
            </form>
            <div id="message"></div>
        </div>

        <!-- หน้าที่ 2: แสดง Google Sheet -->
        <div id="sheetTab" class="tab-content">
            <h2>รายงานข้อมูล</h2>
            <!-- ลิงก์ Google Sheet ของคุณที่เติม /preview ไว้ท้ายสุด -->
            <iframe 
                class="sheet-frame" 
                src="https://docs.google.com/spreadsheets/d/1mjju8Ib74FYmAUjiqhQc8oLwKafw-8Bit5OhlYREKLA/preview">
            </iframe>
        </div>
    </div>

    <script>
        // --- ส่วนที่ 1: การจัดการระบบแท็บ ---
        function switchTab(tabId, clickedButton) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            clickedButton.classList.add('active');
        }

        // --- ส่วนที่ 2: การส่งข้อมูล ---
        // *** ข้อสำคัญ: นำลิงก์ Web App URL ที่ได้จากการ Deploy มาวางที่นี่ ***
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx15jmYyltZm3ZmjhNfFNKf_xrajRkdQVBlXBLfELAFz6kTmm_TP97JBii9uGGAa1Z-Vw/exec';
        
        const form = document.getElementById('recordForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // ตั้งค่าให้ช่องวันที่เป็นวันนี้เสมอ
        document.getElementById('dateInput').valueAsDate = new Date();

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // เปลี่ยนหน้าตาปุ่มตอนกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.textContent = 'กำลังบันทึกข้อมูล...';
            messageDiv.style.display = 'none';

            let requestBody = new FormData(form);

            // ส่งข้อมูลไปยัง Backend
            fetch(SCRIPT_URL, { method: 'POST', body: requestBody })
                .then(response => response.text()) // แปลงผลลัพธ์เป็นข้อความ
                .then(result => {
                    if (result === "Success") {
                        messageDiv.textContent = '✅ บันทึกข้อมูลสำเร็จ!';
                        messageDiv.style.backgroundColor = '#d4edda';
                        messageDiv.style.color = '#155724';
                        form.reset();
                        document.getElementById('dateInput').valueAsDate = new Date();
                        
                        // สั่งให้ Iframe รีเฟรชข้อมูลตารางใหม่
                        document.querySelector('.sheet-frame').src = document.querySelector('.sheet-frame').src;
                    } else {
                        throw new Error(result);
                    }
                })
                .catch(error => {
                    messageDiv.textContent = '❌ เกิดข้อผิดพลาด: โปรดลองอีกครั้ง';
                    messageDiv.style.backgroundColor = '#f8d7da';
                    messageDiv.style.color = '#721c24';
                })
                .finally(() => {
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'บันทึกข้อมูล';
                    setTimeout(() => { messageDiv.style.display = 'none'; }, 4000); // ซ่อนข้อความหลัง 4 วินาที
                });
        });
    </script>
</body>
</html>
